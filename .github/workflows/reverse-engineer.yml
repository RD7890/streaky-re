name: Reverse Engineer & Recompile APK

on:
  push:
    branches: [main]
    paths:
      - "*.apk"
      - "scripts/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reverse-engineer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/
          sudo mv apktool.jar /usr/local/bin/
          apktool --version

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find . -maxdepth 1 -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK ($(du -sh $APK | cut -f1))"

      - name: Decompile APK
        run: |
          apktool d "${{ steps.find_apk.outputs.apk_path }}" -o decompiled --force
          ls decompiled/

      - name: Apply patches (colors, name, package)
        run: python3 scripts/patch_colors.py decompiled/

      - name: Show patched files
        run: |
          find decompiled/ -newer "${{ steps.find_apk.outputs.apk_path }}" -type f | head -30

      - name: Recompile APK
        run: |
          apktool b decompiled/ -o patched-raw.apk
          ls -lh patched-raw.apk

      - name: Zipalign
        run: |
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name "zipalign" | sort -V | tail -1)
          echo "Using zipalign: $ZIPALIGN"
          $ZIPALIGN -v 4 patched-raw.apk patched-aligned.apk
          ls -lh patched-aligned.apk

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore patchify.keystore \
            -alias patchify \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Patchify,OU=RE,O=Patchify,L=City,S=State,C=US" \
            -storepass patchify123 -keypass patchify123 -noprompt

      - name: Sign with apksigner (v1+v2+v3)
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -1)
          echo "Using apksigner: $APKSIGNER"
          $APKSIGNER sign \
            --ks patchify.keystore \
            --ks-key-alias patchify \
            --ks-pass pass:patchify123 \
            --key-pass pass:patchify123 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out patchify-signed.apk \
            patched-aligned.apk
          ls -lh patchify-signed.apk
          $APKSIGNER verify --verbose patchify-signed.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}"
          gh release create "$TAG" patchify-signed.apk \
            --title "Patchify APK — Build ${{ github.run_number }}" \
            --notes "$(printf '## Patchify — built from Streaky v1.0.23\n\n**Changes applied:**\n- App name: Streaky → Patchify\n- Package ID → `com.patchify.app`\n- Colors → deep purple / violet / teal\n- Signed with v1+v2+v3 (Android 5+)\n\n**Build:** ${{ github.run_number }}')" \
            --repo RD7890/streaky-re
          echo "Release: https://github.com/RD7890/streaky-re/releases/tag/$TAG"

      - name: Job summary
        run: |
          TAG="build-${{ github.run_number }}"
          echo "## Patchify APK Built" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** https://github.com/RD7890/streaky-re/releases/download/$TAG/patchify-signed.apk" >> $GITHUB_STEP_SUMMARY
