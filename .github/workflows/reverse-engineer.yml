name: Reverse Engineer & Recompile APK

on:
  push:
    branches: [main]
    paths:
      - "*.apk"
      - "scripts/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reverse-engineer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/
          sudo mv apktool.jar /usr/local/bin/
          apktool --version

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find . -maxdepth 1 -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK ($(du -sh $APK | cut -f1))"

      - name: Decompile APK with apktool
        run: |
          apktool d "${{ steps.find_apk.outputs.apk_path }}" -o decompiled --force
          echo "Decompiled OK:"
          ls decompiled/

      - name: Apply patches (colors, name, package)
        run: python3 scripts/patch_colors.py decompiled/

      - name: Show patched files
        run: |
          echo "=== Files modified by patcher ==="
          find decompiled/ -newer "${{ steps.find_apk.outputs.apk_path }}" -type f | head -30

      - name: Recompile APK
        run: |
          apktool b decompiled/ -o patched-unsigned.apk
          ls -lh patched-unsigned.apk

      - name: Sign APK with debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Patchify,OU=RE,O=RE,L=City,S=State,C=US" \
            -storepass android -keypass android -noprompt
          jarsigner -verbose \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore debug.keystore \
            -storepass android -keypass android \
            patched-unsigned.apk debug
          mv patched-unsigned.apk patchify-signed.apk
          ls -lh patchify-signed.apk

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}"
          gh release create "$TAG" patchify-signed.apk \
            --title "Patchify APK — Build ${{ github.run_number }}" \
            --notes "## Patchify — auto-built from Streaky v1.0.23

          **Changes applied:**
          - App name: Streaky → Patchify
          - Package ID → \`com.patchify.app\`
          - Primary colors → deep purple / violet / teal palette

          **Build:** ${{ github.run_number }}
          **Triggered by:** ${{ github.sha }}" \
            --repo RD7890/streaky-re
          echo "Release URL: https://github.com/RD7890/streaky-re/releases/tag/$TAG"

      - name: Job summary
        run: |
          TAG="build-${{ github.run_number }}"
          echo "## Patchify APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** https://github.com/RD7890/streaky-re/releases/tag/$TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Change | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App name | Streaky → **Patchify** |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | → \`com.patchify.app\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Colors | Orange/Red → Deep Purple/Violet |" >> $GITHUB_STEP_SUMMARY

